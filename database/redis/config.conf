# ============================================================
# groove-ai — Redis Configuration
# Mount this file into the Redis container at /usr/local/etc/redis/redis.conf
# ============================================================

# ── Network ──────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no

# ── Persistence ───────────────────────────────────────────────
# Save a snapshot every 60 seconds if at least 1 key changed
save 60 1
save 300 10
save 900 1

# Append-only file for durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# ── Memory ────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Logging ───────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Database separation ───────────────────────────────────────
# DB 0 → Celery broker
# DB 1 → Celery result backend
# DB 2 → Session / cache
databases 16
